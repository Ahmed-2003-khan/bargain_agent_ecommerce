services:
  orchestrator:
    build: .
    container_name: orchestrator
    ports:
      - "8000:8000"
    environment:
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    depends_on:
      - redis
      - strategy-engine
      - nlu-service
      - llm-phraser

  strategy-engine:
    build: ./microservices/strategy-engine
    container_name: strategy-engine
    ports:
      - "8001:8000"
    environment:
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}

  nlu-service:
    build: ./microservices/nlu-service
    container_name: nlu-service
    ports:
      - "8002:8000"
    environment:
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}

  llm-phraser:
    build: ./microservices/llm-phraser
    container_name: llm-phraser
    ports:
      - "8003:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
