# -------------------------------------------------------
# INA API Gateway — Nginx Reverse Proxy
#
# All external traffic enters through Nginx (:80).
# Nginx forwards to orchestrator (:8000) internally.
# Microservice ports (8001-8003) are NOT exposed externally.
# -------------------------------------------------------

upstream orchestrator {
    server orchestrator:8000;
}

# Rate limiting zone: 10 requests/second per client IP, burst up to 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Connection limiting: max 20 simultaneous connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name _;

    # --- Security Headers ---
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # --- Request Size Limit (1MB max body) ---
    client_max_body_size 1m;

    # --- Timeouts ---
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
    proxy_send_timeout    10s;

    # --- Health Check (no rate limit) ---
    location /health {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
    }

    location = / {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
    }

    # --- Chat Endpoint (rate limited) ---
    location /ina/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://orchestrator;

        # Forward real client IP to orchestrator
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Ping Redis (rate limited, internal use) ---
    location /ping-redis {
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass http://orchestrator;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # --- Custom error pages ---
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"detail": "Rate limit exceeded. Please slow down."}';
    }

    error_page 413 = @payload_too_large;
    location @payload_too_large {
        default_type application/json;
        return 413 '{"detail": "Request body too large. Maximum 1MB allowed."}';
    }
}
